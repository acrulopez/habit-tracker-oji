name: Release

# Manual (workflow_dispatch) release — a fallback for the normal laptop-driven
# flow (`make publish-ios`), which keeps long EAS builds off GitHub Actions so
# they don't burn free-tier minutes. To use this: Actions → Release → Run
# workflow, and enter the version tag (e.g. v1.2.0). This no longer runs on tag
# push. The tag drives the app's marketing version; EAS auto-increments the build
# number. App Store Connect is set to auto-publish once the build finishes review.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v1.2.0)'
        required: true

# Don't let two runs race a build/submit for the same platform.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios:
    name: iOS — build & submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Sync version from tag
        run: npm run set-version "${{ inputs.tag }}"

      - name: Build (iOS, production)
        run: eas build --platform ios --profile production --non-interactive --wait

      - name: Submit to App Store Connect
        run: eas submit --platform ios --profile production --non-interactive --latest

  android:
    name: Android — build & submit
    runs-on: ubuntu-latest
    # DISABLED until Play Console registration is done. To enable:
    #   1. finish Play Console setup + closed-testing requirements
    #   2. add the PLAY_SERVICE_ACCOUNT_JSON secret
    #   3. set the repo variable ANDROID_RELEASE_ENABLED to "true"
    if: ${{ vars.ANDROID_RELEASE_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Sync version from tag
        run: npm run set-version "${{ inputs.tag }}"

      # eas.json references ./play-service-account.json (git-ignored); recreate it here.
      - name: Write Play service account key
        run: printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > play-service-account.json
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Build (Android, production)
        run: eas build --platform android --profile production --non-interactive --wait

      - name: Submit to Google Play
        run: eas submit --platform android --profile production --non-interactive --latest
